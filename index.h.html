<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Work</title>
    <style>
        h1 {
            text-align: center;
            margin: bottom 20px;
        }
        table {
            width: 50%;
            border-collapse: collapse;
            margin: 0 auto;
        }
        td, th {
            border: 1px solid #000;
            padding: 10px;
            vertical-align: middle;
        }
        buttons {
            text-align: center;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Student Registration Form</h1>
       <form>
            <table>
                <tr>
                    <th><label for="Student ID">Student ID</label></th>
                    <td><input type="text" id="student_id" name="student_id" required></td>
                </tr>
                <tr>
                    <th><label for="First Name">First Name</label></th>
                    <td><input type="text" id="first_name" name="first_name" required></td>
                </tr>
                <tr>
                    <th><label for="Last Name">Last Name</label></th>
                    <td><input type="text" id="last_name" name="last_name" required></td>
                </tr>
                <tr>
                    <th><label for="Age">Gender</label></th>
                    <td>
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female" required>  
                        <label for="female">Female</label>
                    </td>
                </tr>
                <tr>
                    <th><label for="Date Of Birth">Date Of Birth</label></th>
                    <td><input type="date" id="date_of_birth" name="date_of_birth" required></td>

                </tr>
                <tr>
                    <th><label for="Email">Email</label></th>
                    <td><input type="email" id="email" name="email" required></td>

                </tr>
                <tr>
                    <th><label for="Phone Number">Phone Number</label></th>
                    <td><input type="tel" id="phone_number" name="phone_number" required></td>
                </tr>
                <tr> 
                    <th><label for="Address">Address</label></th>

                    <td><input type=" text " id="address" name="address" required></td>
                </tr>
                <tr>
                    <th><label for="Course">Course</label></th>
                    <td><select id="course" name="course" required>
                        <option value="">Select Course</option>
                        <option value="HTML">HTML</option>
                        <option value="CSS">CSS</option>
                        <option value="JS">JS</option>
                    </select></td>
                </tr>
                    </tb>
                </tr>
                <tr>
                    <th><label for="Photo">Photo</label></th>
                    <td><input type="file" id="photo" name="photo" accept="image/*"></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <button type="submit">Save</button>
                        <button type="reset">Reset</button>
                    </td>
                </tr>
            </table>
       </form>
</body>
</html>
